            explicacao: "Pele delgada não possui estrato lúcido, contém pelos, glândulas sebáceas e sudoríparas."
        },
        {
            pergunta: "Os seios esplênicos (sinusoides) do baço localizam-se na:",
            opcoes: ["Polpa branca", "Bainha linfática periarterial", "Polpa vermelha", "Cápsula"],
            correta: 2,
            categoria: "Sistema Linfoide",
            explicacao: "Polpa vermelha contém seios esplênicos (espaços reticulares) e cordões esplênicos."
        },
        {
            pergunta: "O comando para a contração do músculo estriado esquelético inicia-se na placa motora com a liberação de:",
            opcoes: ["Noradrenalina", "Acetilcolina", "GABA", "Dopamina"],
            correta: 1,
            categoria: "Tecido Muscular",
            explicacao: "O neurotransmissor acetilcolina é liberado na fenda sináptica da placa motora."
        },
        {
            pergunta: "As células de Merkel, encontradas na camada basal da epiderme, atuam como:",
            opcoes: ["Células apresentadoras de antígeno", "Mecanorreceptores (tato)", "Produtoras de melanina", "Células de defesa fagocitárias"],
            correta: 1,
            categoria: "Sistema Tegumentar",
            explicacao: "Células de Merkel são mecanorreceptores de adaptação lenta, importantes para o tato."
        },
        {
            pergunta: "No músculo liso, o cálcio necessário para a contração liga-se à:",
            opcoes: ["Troponina C", "Calmodulina", "Miosina quinase", "Actina"],
            correta: 1,
            categoria: "Tecido Muscular",
            explicacao: "No músculo liso, o Ca²⁺ liga-se à calmodulina, ativando a miosina quinase e permitindo a contração."
        },
        {
            pergunta: "O tecido linfóide associado aos brônquios é conhecido como:",
            opcoes: ["GALT", "BALT", "MALT", "SALT"],
            correta: 1,
            categoria: "Sistema Linfoide",
            explicacao: "BALT = Bronchus-Associated Lymphoid Tissue (tecido linfóide associado aos brônquios)."
        },
        {
            pergunta: "Os corpúsculos de Pacini, presentes na derme profunda e hipoderme, são responsáveis por detectar:",
            opcoes: ["Pressão e vibração", "Tato fino", "Dor", "Temperatura"],
            correta: 0,
            categoria: "Sistema Tegumentar",
            explicacao: "Corpúsculos de Pacini são mecanorreceptores encapsulados que respondem a pressão profunda e vibração."
        },
        {
            pergunta: "No músculo cardíaco, as mitocôndrias são abundantes e ocupam cerca de:",
            opcoes: ["10% do citoplasma", "25% do citoplasma", "40% do citoplasma", "60% do citoplasma"],
            correta: 2,
            categoria: "Tecido Muscular",
            explicacao: "O coração depende muito de ATP aeróbico; as mitocôndrias chegam a ocupar 40% do volume citoplasmático."
        },
        {
            pergunta: "As tonsilas faríngeas (adenoide), quando hipertrofiadas, podem causar:",
            opcoes: ["Amigdalite", "Obstrução nasal e ronco", "Faringite", "Otite média"],
            correta: 1,
            categoria: "Sistema Linfoide",
            explicacao: "A hipertrofia da tonsila faríngea pode obstruir a passagem nasal e a tuba auditiva, levando a ronco e infecções."
        },
        {
            pergunta: "A união derme-epiderme é reforçada por hemidesmossomos e fibrilas de ancoragem (colágeno VII) que compõem a:",
            opcoes: ["Membrana basal", "Lâmina lúcida", "Lâmina densa", "Zona reticular"],
            correta: 0,
            categoria: "Sistema Tegumentar",
            explicacao: "A membrana basal (junção dermoepidérmica) contém hemidesmossomos e fibrilas de ancoragem."
        },
        {
            pergunta: "A energia para a contração muscular é fornecida pela hidrólise de ATP pela cabeça da miosina. A enzima envolvida é a:",
            opcoes: ["ATP sintase", "ATPase de miosina", "Creatina quinase", "Fosfatase"],
            correta: 1,
            categoria: "Tecido Muscular",
            explicacao: "A cabeça da miosina possui atividade ATPásica, clivando ATP para gerar energia e movimento."
        }
    ];

    // ------------- estado do quiz -------------
    let perguntas = [...perguntasDB];
    let indiceAtual = 0;
    let respostasUsuario = [];
    let quizFinalizado = false;
    let aguardandoProximo = false;

    const appContainer = document.getElementById('quizBody');
    const acertosSpan = document.getElementById('acertosCount');
    const errosSpan = document.getElementById('errosCount');
    const progressoTexto = document.getElementById('progressoTexto');
    const totalSpan = document.getElementById('totalPerguntasSpan');

    function atualizarPlacar() {
        let acertos = respostasUsuario.filter(r => r && r.acertou === true).length;
        let erros = respostasUsuario.filter(r => r && r.acertou === false).length;
        acertosSpan.innerText = acertos;
        errosSpan.innerText = erros;
        let respondidas = respostasUsuario.filter(r => r !== undefined).length;
        progressoTexto.innerText = `${respondidas}`;
        totalSpan.innerText = perguntas.length;
    }

    function gerarRelatorioDificuldades() {
        const errosPorCategoria = {};
        const acertosPorCategoria = {};
        respostasUsuario.forEach(resp => {
            if (!resp) return;
            const cat = resp.categoria;
            if (!errosPorCategoria[cat]) {
                errosPorCategoria[cat] = 0;
                acertosPorCategoria[cat] = 0;
            }
            if (resp.acertou) acertosPorCategoria[cat]++;
            else errosPorCategoria[cat]++;
        });
        let categoriasAnalise = [];
        for (let cat in errosPorCategoria) {
            let total = errosPorCategoria[cat] + acertosPorCategoria[cat];
            let percErro = total > 0 ? (errosPorCategoria[cat] / total) * 100 : 0;
            categoriasAnalise.push({
                categoria: cat,
                erros: errosPorCategoria[cat],
                acertos: acertosPorCategoria[cat],
                percErro: percErro
            });
        }
        categoriasAnalise.sort((a,b) => b.percErro - a.percErro);
        return categoriasAnalise;
    }

    function exibirTelaFinal() {
        const totalPerg = perguntas.length;
        const respondidas = respostasUsuario.filter(r => r !== undefined).length;
        const acertos = respostasUsuario.filter(r => r && r.acertou).length;
        const erros = totalPerg - acertos;
        const desempenhoPercent = totalPerg > 0 ? Math.round((acertos/totalPerg)*100) : 0;
        const dificuldades = gerarRelatorioDificuldades();
        
        let htmlFinal = `
            <div class="result-area">
                <h2 style="color:#1f2b3c; margin-bottom: 12px;">📋 Relatório final - ${totalPerg} questões</h2>
                <p style="font-size:1.2rem; font-weight:bold;">✅ ${acertos} acertos &nbsp;|&nbsp; ❌ ${erros} erros</p>
                <p style="margin: 5px 0;">🎯 Aproveitamento: ${desempenhoPercent}% (${respondidas}/${totalPerg} respondidas)</p>
                <hr style="margin: 18px 0; border-color:#dce5f0;">
                <h3>🔍 Áreas com maior dificuldade:</h3>
        `;
        if (dificuldades.length === 0 || erros === 0) {
            htmlFinal += `<p style="background:#e0f2e9; padding:12px; border-radius: 24px;">✨ Parabéns! Nenhum erro registrado. Domínio excelente! ✨</p>`;
        } else {
            for (let item of dificuldades) {
                if (item.erros > 0) {
                    htmlFinal += `
                        <div class="dificuldade-item">
                            <strong>📌 ${item.categoria}</strong><br>
                            ❌ ${item.erros} erro(s) | ✅ ${item.acertos} acerto(s)<br>
                            <span style="font-size:0.85rem; color:#c2413c;">⚠️ Revisar conceitos: ${item.categoria}</span>
                        </div>
                    `;
                } else {
                    htmlFinal += `
                        <div class="dificuldade-item" style="border-left-color: #2e7d64;">
                            <strong>📗 ${item.categoria}</strong> — domínio consolidado (0 erros)
                        </div>
                    `;
                }
            }
        }
        htmlFinal += `
                <button class="restart-btn" id="btnReiniciar">🔄 Refazer o quiz completo (${totalPerg} questões)</button>
                <p style="margin-top: 20px; font-size:0.85rem;">💡 Dica: foque nas áreas com mais erros usando os PDFs de origem.</p>
            </div>
        `;
        appContainer.innerHTML = htmlFinal;
        const restartBtn = document.getElementById('btnReiniciar');
        if (restartBtn) restartBtn.addEventListener('click', () => reiniciarQuiz());
        quizFinalizado = true;
    }

    function validarResposta(botaoClicado, indiceEscolhido) {
        if (aguardandoProximo) return;
        const questao = perguntas[indiceAtual];
        const isCorreto = (indiceEscolhido === questao.correta);
        
        respostasUsuario[indiceAtual] = {
            acertou: isCorreto,
            categoria: questao.categoria,
            pergunta: questao.pergunta,
            escolha: indiceEscolhido,
            correta: questao.correta
        };
        
        const allBtns = document.querySelectorAll('.btn-opcao');
        allBtns.forEach((btn, idx) => {
            btn.classList.add('disabled-opt');
            btn.style.pointerEvents = 'none';
            if (idx === questao.correta) btn.classList.add('correto');
            if (idx === indiceEscolhido && !isCorreto) btn.classList.add('incorreto');
        });
        
        const feedbackMsg = document.createElement('div');
        feedbackMsg.style.marginTop = '12px';
        feedbackMsg.style.padding = '8px';
        feedbackMsg.style.borderRadius = '30px';
        feedbackMsg.style.backgroundColor = isCorreto ? '#e0f2e9' : '#ffe6e5';
        feedbackMsg.style.fontSize = '0.85rem';
        feedbackMsg.style.textAlign = 'center';
        feedbackMsg.innerText = isCorreto ? '✅ Correto! ' + questao.explicacao : `❌ Incorreto. Resposta certa: ${questao.opcoes[questao.correta]}. ${questao.explicacao}`;
        const containerPai = document.querySelector('.opcoes-container');
        const existingMsg = document.querySelector('.feedback-instant');
        if(existingMsg) existingMsg.remove();
        feedbackMsg.classList.add('feedback-instant');
        containerPai.after(feedbackMsg);
        
        aguardandoProximo = true;
        const nextDynamic = document.getElementById('dynamicNextBtn');
        if(nextDynamic) nextDynamic.style.display = 'block';
        atualizarPlacar();
    }
    
    function mostrarPergunta() {
        if (indiceAtual >= perguntas.length) {
            exibirTelaFinal();
            return;
        }
        const q = perguntas[indiceAtual];
        const progressDiv = document.createElement('div');
        progressDiv.className = 'progress-info';
        progressDiv.innerHTML = `<span>📌 ${q.categoria}</span><span>Questão ${indiceAtual+1} de ${perguntas.length}</span>`;
        
        const perguntaDiv = document.createElement('div');
        perguntaDiv.className = 'pergunta-texto';
        perguntaDiv.innerText = `${indiceAtual+1}. ${q.pergunta}`;
        
        const opcoesContainer = document.createElement('div');
        opcoesContainer.className = 'opcoes-container';
        
        q.opcoes.forEach((texto, idx) => {
            const btn = document.createElement('button');
            btn.innerText = `${String.fromCharCode(65+idx)}. ${texto}`;
            btn.classList.add('btn-opcao');
            btn.addEventListener('click', () => validarResposta(btn, idx));
            opcoesContainer.appendChild(btn);
        });
        
        let nextBtn = document.createElement('button');
        nextBtn.innerText = '➡️ PRÓXIMA PERGUNTA';
        nextBtn.classList.add('next-btn');
        nextBtn.style.display = 'none';
        nextBtn.id = 'dynamicNextBtn';
        nextBtn.addEventListener('click', () => {
            if (!aguardandoProximo) return;
            indiceAtual++;
            aguardandoProximo = false;
            renderizarTelaAtual();
        });
        
        appContainer.innerHTML = '';
        appContainer.appendChild(progressDiv);
        appContainer.appendChild(perguntaDiv);
        appContainer.appendChild(opcoesContainer);
        appContainer.appendChild(nextBtn);
        aguardandoProximo = false;
    }
    
    function renderizarTelaAtual() {
        if (indiceAtual < perguntas.length) mostrarPergunta();
        else exibirTelaFinal();
    }
    
    function reiniciarQuiz() {
        indiceAtual = 0;
        respostasUsuario = [];
        aguardandoProximo = false;
        quizFinalizado = false;
        atualizarPlacar();
        renderizarTelaAtual();
    }
    
    function init() {
        totalSpan.innerText = perguntas.length;
        atualizarPlacar();
        renderizarTelaAtual();
    }
    init();
</script>
</body>
</html>
